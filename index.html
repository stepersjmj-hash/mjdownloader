<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reelsnap by MJ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🎬 Reelsnap</h1>
      <p>인스타그램 비디오 &amp; 사진 무료 다운로드 &nbsp;·&nbsp; by MJ</p>
    </div>

    <!-- ── 일괄 URL 다운로드 카드 ── -->
    <div class="bulk-card">
      <h2>일괄 다운로드</h2>
      <textarea
        class="bulk-textarea"
        id="bulkText"
        placeholder="텍스트를 붙여넣으세요. 인스타그램 URL을 자동으로 찾아냅니다.&#10;예) 오늘 찍은 영상 https://www.instagram.com/p/abc123/ 정말 예쁘다 https://www.instagram.com/reel/xyz456/"
      ></textarea>
      <div class="bulk-actions">
        <button class="btn-extract" onclick="extractUrls()">🔍 URL 추출</button>
        <button class="btn-clear-text" onclick="clearBulk()">초기화</button>
      </div>

      <div class="url-list" id="urlList">
        <div class="url-list-header">
          <span id="urlListTitle">0개 URL 발견</span>
          <button class="btn-toggle-all" onclick="toggleAll()">전체 선택/해제</button>
        </div>
        <div id="urlListItems"></div>
        <div class="bulk-download-bar">
          <button class="btn-bulk-dl" id="bulkDlBtn" onclick="bulkDownload()">⬇ 선택한 URL 다운로드</button>
          <span class="bulk-progress" id="bulkProgress"></span>
        </div>
      </div>
    </div>

    <!-- ── 단일 URL 다운로드 카드 ── -->
    <div class="card">
      <div class="search-box">
        <input type="text" id="urlInput" placeholder="인스타그램 링크를 붙여넣으세요 (예: https://www.instagram.com/p/...)" />
        <button class="btn-paste" onclick="pasteUrl()" title="클립보드에서 붙여넣기">📋 붙여넣기</button>
        <button class="btn-download" id="downloadBtn" onclick="startDownload()">다운로드</button>
      </div>

      <div class="status" id="status"></div>
      <div class="results" id="results"></div>

      <div class="how-to">
        <h3>사용 방법</h3>
        <div class="steps">
          <div class="step">
            <div class="step-num">1</div>
            <div class="step-text">인스타그램 앱/웹에서 원하는 게시물을 열고 링크를 복사합니다</div>
          </div>
          <div class="step">
            <div class="step-num">2</div>
            <div class="step-text">위 입력창에 링크를 붙여넣고 [다운로드] 버튼을 클릭합니다</div>
          </div>
          <div class="step">
            <div class="step-num">3</div>
            <div class="step-text">결과에서 원하는 품질을 선택하여 다운로드합니다</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
